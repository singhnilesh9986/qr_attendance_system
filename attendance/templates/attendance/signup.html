{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Register | QRAttend</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-[#f8fafc] min-h-screen flex items-center justify-center p-6">
    <div class="bg-white p-10 rounded-[40px] shadow-2xl w-full max-w-md border border-gray-100 flex flex-col items-center">
        <h1 class="text-3xl font-black mb-2 text-gray-800 text-center">Student <span class="text-[#137fec]">Register</span></h1>
        <p class="text-gray-400 text-sm mb-8 text-center">Create your profile to join the class</p>

        {% if error %}
            <div class="w-full p-3 mb-4 text-sm text-red-700 bg-red-100 rounded-xl text-center">{{ error }}</div>
        {% endif %}

        <form method="POST" class="w-full flex flex-col gap-4">
            {% csrf_token %}
            <div class="text-left w-full">
                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1 ml-1">Full Name</label>
                <input type="text" name="name" placeholder="John Doe" required class="w-full p-4 bg-[#e8f0fe] border-none rounded-xl outline-none text-gray-700">
            </div>
            <div class="text-left w-full">
                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1 ml-1">Roll Number / ID</label>
                <input type="text" name="roll_no" placeholder="2024CS101" required class="w-full p-4 bg-[#e8f0fe] border-none rounded-xl outline-none text-gray-700">
            </div>
            <div class="text-left w-full">
                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1 ml-1">Email</label>
                <input type="email" name="email" placeholder="email@example.com" required class="w-full p-4 bg-[#e8f0fe] border-none rounded-xl outline-none text-gray-700">
            </div>
            <div class="text-left w-full">
                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1 ml-1">Password</label>
                <input type="password" name="password" placeholder="Create Password" required class="w-full p-4 bg-[#e8f0fe] border-none rounded-xl outline-none text-gray-700">
            </div>
            <button type="submit" class="w-full bg-[#137fec] text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-600 transition-all mt-4">Register</button>
        </form>

        <div class="mt-8 text-center">
            <p class="text-sm text-gray-500 font-medium">Already have an account? <a href="{% url 'student_login' %}" class="text-[#137fec] font-bold hover:underline">Login</a></p>
        </div>
    </div>
</body>
</html>
